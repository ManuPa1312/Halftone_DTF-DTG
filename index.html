<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTF Pro Tool - Controllo Inchiostro & Halftone</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #252538;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            max-width: 550px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #f5c2e7; margin-top: 0; font-size: 24px; }
        h2 { color: #94e2d5; font-size: 18px; text-align: left; margin-top: 25px; border-bottom: 1px solid #45475a; padding-bottom: 5px; }
        .section { margin: 15px 0; text-align: left; }
        .control-group { background-color: #1e1e2e; padding: 15px; border-radius: 8px; border: 1px solid #313244; margin-bottom: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #bac2de; }
        input[type="file"], select, input[type="range"] {
            width: 100%;
            padding: 10px;
            background-color: #313244;
            border: 1px solid #45475a;
            border-radius: 6px;
            color: #cdd6f4;
            box-sizing: border-box;
        }
        .radio-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .radio-label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 13px; color: #cdd6f4; }
        .btn {
            color: #11111b;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-hd { background-color: #cba6f7; }
        .btn-hd:hover { background-color: #f5c2e7; }
        .btn-dl-clean { background-color: #f9e2af; margin-top: 5px; }
        .btn-dl-clean:hover { background-color: #eba0ac; }
        .btn-dtf { background-color: #a6e3a1; margin-top: 20px; padding: 14px; font-size: 16px; }
        .btn-dtf:hover { background-color: #94e2d5; }
        .btn:disabled { background-color: #585b70; color: #a6adc8; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; color: #f9e2af; font-size: 14px; min-height: 1.2em; }
        .preview-box { max-height: 250px; overflow: hidden; margin-top: 15px; border-radius: 8px; display: none; border: 2px dashed #45475a; background-color: #11111b;}
        .preview-box img { width: 100%; height: auto; object-fit: contain; max-height: 250px; display: block;}
    </style>
</head>
<body>

<div class="container">
    <h1>🖨️ DTF Tool - HD Upscale & Halftone Pro</h1>
    <p style="font-size: 13px; color: #a6adc8; margin-bottom: 20px;">Ottimizzazione densità punti e inchiostro per evitare stampe sbiadite.</p>

    <div class="section">
        <label for="imageLoader">Carica la tua foto di partenza:</label>
        <input type="file" id="imageLoader" accept="image/*">
        <div class="preview-box" id="previewContainer">
            <img id="srcPreview" src="" alt="Anteprima">
        </div>
    </div>

    <h2>Fase 1: Ingrandimento e Miglioramento Qualità (HD)</h2>
    <div class="control-group">
        <div class="section">
            <label>Moltiplicatore Risoluzione (Upscaling Nativo):</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="upscaleOpt" value="1"> Originale (No Upscale)</label>
                <label class="radio-label"><input type="radio" name="upscaleOpt" value="2" checked> 2x (Alta Definizione)</label>
                <label class="radio-label"><input type="radio" name="upscaleOpt" value="3"> 3x (Massima Risoluzione)</label>
            </div>
        </div>
        <button class="btn btn-hd" id="btnUpscale">⚡ Ingrandisci e Ottimizza Dettagli</button>
        <button class="btn btn-dl-clean" id="btnDownloadClean" disabled>📥 Scarica solo l'immagine HD (No Halftone)</button>
    </div>

    <h2>Fase 2: Ottimizzazione e Retinatura DTF (Halftone)</h2>
    <div class="control-group">
        <div class="section">
            <label>1. Tipo di Capo / Colore da rimuovere:</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="modalita" value="nero" checked> Capo Scuri (Rimuovi Nero)</label>
                <label class="radio-label"><input type="radio" name="modalita" value="bianco"> Capo Chiari (Rimuovi Bianco)</label>
            </div>
        </div>

        <div class="section">
            <label>2. Tecnica di Sfumatura:</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="tecnica" value="ibrida" checked id="techIbrida"> Rasterizzazione Ibrida (Maintop)</label>
                <label class="radio-label"><input type="radio" name="tecnica" value="classica"> Trasparenza Classica</label>
            </div>
        </div>

        <div class="section">
            <label id="lblTolleranza">Morbidezza Sfumatura (Tolleranza): 1.4</label>
            <input type="range" id="sliderTolleranza" min="0.5" max="2.5" step="0.1" value="1.4">
        </div>

        <div class="section">
            <label id="lblMaxWhite">Limite Massimo Inchiostro Bianco: 65%</label>
            <input type="range" id="sliderMaxWhite" min="30" max="100" step="5" value="65">
        </div>

        <div class="section" id="secPunti">
            <label id="lblPunti">Dimensione Punti Retinatura: 4 px</label>
            <input type="range" id="sliderPunti" min="2" max="8" step="1" value="4">
        </div>
    </div>

    <button class="btn btn-dtf" id="btnElabora">Genera e Scarica PNG per Maintop</button>
    <div id="status"></div>
</div>

<script>
    let imgOriginale = null;
    let canvasHD = null; 

    const imageLoader = document.getElementById('imageLoader');
    const previewContainer = document.getElementById('previewContainer');
    const srcPreview = document.getElementById('srcPreview');
    const btnUpscale = document.getElementById('btnUpscale');
    const btnDownloadClean = document.getElementById('btnDownloadClean');
    const btnElabora = document.getElementById('btnElabora');
    const status = document.getElementById('status');
    const sliderTolleranza = document.getElementById('sliderTolleranza');
    const sliderMaxWhite = document.getElementById('sliderMaxWhite');
    const sliderPunti = document.getElementById('sliderPunti');
    const lblTolleranza = document.getElementById('lblTolleranza');
    const lblMaxWhite = document.getElementById('lblMaxWhite');
    const lblPunti = document.getElementById('lblPunti');
    const secPunti = document.getElementById('secPunti');

    sliderTolleranza.addEventListener('input', (e) => lblTolleranza.innerText = `Morbidezza Sfumatura (Tolleranza): ${parseFloat(e.target.value).toFixed(1)}`);
    sliderMaxWhite.addEventListener('input', (e) => lblMaxWhite.innerText = `Limite Massimo Inchiostro Bianco: ${e.target.value}%`);
    sliderPunti.addEventListener('input', (e) => lblPunti.innerText = `Dimensione Punti Retinatura: ${e.target.value} px`);

    document.getElementsByName('tecnica').forEach(radio => {
        radio.addEventListener('change', (e) => {
            secPunti.style.opacity = e.target.value === 'classica' ? '0.4' : '1';
            sliderPunti.disabled = e.target.value === 'classica';
        });
    });

    imageLoader.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            status.innerText = "Caricamento immagine originale...";
            const reader = new FileReader();
            reader.onload = function(event) {
                imgOriginale = new Image();
                imgOriginale.onload = function() {
                    canvasHD = document.createElement('canvas');
                    canvasHD.width = imgOriginale.width;
                    canvasHD.height = imgOriginale.height;
                    const ctx = canvasHD.getContext('2d');
                    ctx.drawImage(imgOriginale, 0, 0);

                    srcPreview.src = event.target.result;
                    previewContainer.style.display = 'block';
                    btnDownloadClean.disabled = true;
                    status.innerText = "Immagine caricata.";
                };
                imgOriginale.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    btnUpscale.addEventListener('click', () => {
        if (!imgOriginale) { alert("Carica prima un'immagine!"); return; }
        btnUpscale.disabled = true;
        status.innerText = "Elaborazione upscaling...";

        setTimeout(() => {
            try {
                const moltiplicatore = parseInt(document.querySelector('input[name="upscaleOpt"]:checked').value);
                const upCanvas = document.createElement('canvas');
                upCanvas.width = imgOriginale.width * moltiplicatore;
                upCanvas.height = imgOriginale.height * moltiplicatore;
                const upCtx = upCanvas.getContext('2d');

                upCtx.imageSmoothingEnabled = true;
                upCtx.imageSmoothingQuality = 'high';
                upCtx.drawImage(imgOriginale, 0, 0, upCanvas.width, upCanvas.height);

                if (moltiplicatore > 1) {
                    const imgData = upCtx.getImageData(0, 0, upCanvas.width, upCanvas.height);
                    const data = imgData.data;
                    const w = upCanvas.width;
                    const h = upCanvas.height;
                    const copia = new Uint8ClampedArray(data);
                    const k = [0, -0.3, 0, -0.3, 2.2, -0.3, 0, -0.3, 0];
                    
                    for (let y = 1; y < h - 1; y++) {
                        for (let x = 1; x < w - 1; x++) {
                            for (let c = 0; c < 3; c++) {
                                let sum = 0;
                                for (let ky = -1; ky <= 1; ky++) {
                                    for (let kx = -1; kx <= 1; kx++) {
                                        sum += copia[((y + ky) * w + (x + kx)) * 4 + c] * k[(ky + 1) * 3 + (kx + 1)];
                                    }
                                }
                                data[(y * w + x) * 4 + c] = Math.min(255, Math.max(0, sum));
                            }
                        }
                    }
                    upCtx.putImageData(imgData, 0, 0);
                }

                canvasHD = upCanvas;
                srcPreview.src = canvasHD.toDataURL('image/png');
                status.innerText = "Immagine HD ottimizzata!";
                btnUpscale.disabled = false;
                btnDownloadClean.disabled = false;
            } catch (err) {
                status.innerText = "Errore nell'ottimizzazione HD.";
                btnUpscale.disabled = false;
            }
        }, 50);
    });

    btnDownloadClean.addEventListener('click', () => {
        if (!canvasHD) return;
        const link = document.createElement('a');
        link.download = 'immagine_hd.png';
        link.href = canvasHD.toDataURL('image/png');
        link.click();
    });

    btnElabora.addEventListener('click', () => {
        if (!canvasHD) { alert("Carica un'immagine!"); return; }
        status.innerText = "Generazione Halftone bilanciato...";
        btnElabora.disabled = true;

        setTimeout(() => {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = canvasHD.width;
                canvas.height = canvasHD.height;
                ctx.drawImage(canvasHD, 0, 0);

                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imgData.data;
                const width = canvas.width;
                const height = canvas.height;

                const modalita = document.querySelector('input[name="modalita"]:checked').value;
                const tecnica = document.querySelector('input[name="tecnica"]:checked').value;
                const tolleranza = parseFloat(sliderTolleranza.value);
                const maxWhiteCap = parseInt(sliderMaxWhite.value) / 100;
                const dimPunto = parseInt(sliderPunti.value);

                const matriceAlpha = new Int32Array(width * height);
                for (let i = 0; i < pixels.length; i += 4) {
                    const r = pixels[i], g = pixels[i+1], b = pixels[i+2], a = pixels[i+3];
                    if (a === 0) { matriceAlpha[i/4] = 0; continue; }

                    const luminanza = (0.299 * r + 0.587 * g + 0.114 * b) / 255.0;
                    
                    // Curva di tolleranza modificata per tagliare i mezzitoni scuri
                    let nuovoAlpha = modalita === 'nero' ? 
                        Math.floor(a * Math.pow(luminanza, tolleranza)) : 
                        Math.floor(a * Math.pow(1.0 - luminanza, tolleranza));
                    
                    // Applica il tetto massimo all'inchiostro bianco
                    nuovoAlpha = Math.min(nuovoAlpha, Math.floor(255 * maxWhiteCap));
                    matriceAlpha[i/4] = Math.max(0, nuovoAlpha);
                }

                if (tecnica === 'classica') {
                    for (let i = 0; i < pixels.length; i += 4) { pixels[i+3] = matriceAlpha[i/4]; }
                    ctx.putImageData(imgData, 0, 0);
                } else {
                    ctx.clearRect(0, 0, width, height);
                    for (let y = 0; y < height; y += dimPunto) {
                        for (let x = 0; x < width; x += dimPunto) {
                            let sommaAlpha = 0, conteggio = 0;
                            for (let py = y; py < Math.min(y + dimPunto, height); py++) {
                                for (let px = x; px < Math.min(x + dimPunto, width); px++) {
                                    sommaAlpha += matriceAlpha[py * width + px];
                                    conteggio++;
                                }
                            }
                            const alphaMedio = conteggio > 0 ? sommaAlpha / conteggio : 0;
                            if (alphaMedio < 20) continue; // Taglia i rimasugli di pixel "sporchi"

                            const cx = Math.min(x + Math.floor(dimPunto / 2), width - 1);
                            const cy = Math.min(y + Math.floor(dimPunto / 2), height - 1);
                            const idx = (cy * width + cx) * 4;

                            // Se la zona supera la soglia massima calcolata, scala la dimensione del punto geometrico
                            const raggio = (dimPunto / 2.0) * Math.sqrt(alphaMedio / 255.0);
                            ctx.beginPath();
                            ctx.arc(x + dimPunto/2, y + dimPunto/2, Math.max(0.1, raggio), 0, Math.PI * 2);
                            ctx.fillStyle = `rgba(${pixels[idx]},${pixels[idx+1]},${pixels[idx+2]},1)`;
                            ctx.fill();
                        }
                    }
                }

                const link = document.createElement('a');
                link.download = 'dtf_halftone_bilanciato.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                status.innerText = "File Halftone ottimizzato scaricato!";
                btnElabora.disabled = false;
            } catch (err) {
                status.innerText = "Errore nell'elaborazione.";
                btnElabora.disabled = false;
            }
        }, 50);
    });
</script>

</body>
</html>
